<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="rpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0533C"/>
      <stop offset="100%" stop-color="#F2994A"/>
    </linearGradient>
  </defs>
  
  <!-- Background Squircle Container -->
  <rect width="100" height="100" rx="24" fill="url(#rpGradient)"/>
  
  <!-- Outer subtle glow accent ring -->
  <rect x="3" y="3" width="94" height="94" rx="21" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Gourmet Utensil Icons: Crossed Chef Knife & Spatula / Cooking Pan silhouette -->
  <g fill="#FFFFFF">
    <!-- Monogram RP -->
    <text x="50" y="56" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="42" text-anchor="middle" letter-spacing="-2">RP</text>
    
    <!-- Gourmet text ribbon -->
    <text x="50" y="77" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="800" font-size="12" text-anchor="middle" letter-spacing="2" opacity="0.95">GOURMET</text>
  </g>

  <!-- Top accent star / chef hat dot -->
  <circle cx="50" cy="18" r="3.5" fill="#FFFFFF"/>
</svg>